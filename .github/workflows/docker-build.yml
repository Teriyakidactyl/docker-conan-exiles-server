name: Build Conan Exiles Server Docker Images

on:
  push:
    branches:
      - dev
      - main
    paths:
      - 'Dockerfile'
      - 'dockerfile'
      - '.github/workflows/**'
      - 'scripts/**'
  pull_request:
    branches:
      - dev
      - main
    paths:
      - 'Dockerfile'
      - 'dockerfile'
      - '.github/workflows/**'
      - 'scripts/**'
  workflow_dispatch:  # Allows manual triggering

# Add concurrency control to cancel in-progress workflows when new commits are pushed
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Global environment variables used throughout the workflow
env:
  # Registry information
  REGISTRY_IMAGE: ghcr.io/teriyakidactyl/docker-conan-exiles-server
  
  # Base image registry
  BASE_REGISTRY_IMAGE: ghcr.io/teriyakidactyl/docker-steamcmd-server
  
  # Matrix Configuration - Base image tags to build upon
  # These should match the available tags from the base image
  MATRIX_BASE_TAGS: |
    trixie-20260421-slim_wine-staging-11.8
    bookworm-20260421-slim_wine-staging-11.8
    trixie-20260421-slim_wine-stable-11.0.0.0
    bookworm-20260421-slim_wine-stable-11.0.0.0
    
  # Target platforms
  MATRIX_PLATFORMS: |
    linux/amd64
    linux/arm64

jobs:
  # Setup job to process matrix values from environment variables
  setup:
    runs-on: ubuntu-latest
    timeout-minutes: 5  # Set timeout limit
    outputs:
      base-tags: ${{ steps.set-matrix.outputs.base-tags }}
      platforms: ${{ steps.set-matrix.outputs.platforms }}
    steps:
      - id: set-matrix
        name: Process matrix configurations
        run: |
          # Process the multiline env vars into JSON arrays for matrix strategy
          # Remove empty lines, add quotes, convert to JSON array
          BASE_TAGS=$(echo '${{ env.MATRIX_BASE_TAGS }}' | grep -v '^$' | awk '{print "\""$0"\""}' | paste -sd, | awk '{print "["$0"]"}')
          PLATFORMS=$(echo '${{ env.MATRIX_PLATFORMS }}' | grep -v '^$' | awk '{print "\""$0"\""}' | paste -sd, | awk '{print "["$0"]"}')
          
          # Echo the values for debugging
          echo "Generated base-tags: $BASE_TAGS"
          echo "Generated platforms: $PLATFORMS"
          
          # Set the outputs
          echo "base-tags=$BASE_TAGS" >> $GITHUB_OUTPUT
          echo "platforms=$PLATFORMS" >> $GITHUB_OUTPUT

  # Build job that creates individual architecture-specific images
  build:
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 60  # Set timeout limit
    strategy:
      matrix:
        base_tag: ${{ fromJson(needs.setup.outputs.base-tags) }}
        platform: ${{ fromJson(needs.setup.outputs.platforms) }}
      fail-fast: false  # Continue other matrix builds if one fails

    steps:
      # Check out the repository code
      - name: Check out repository
        uses: actions/checkout@v4

      # Set up QEMU for multi-platform builds
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: ${{ matrix.platform }}

      # Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          install: true

      # Log in to GitHub Container Registry (only for pushes, not PRs)
      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      # Prepare tag variables
      - name: Prepare tag variables
        id: prep-tags
        run: |
          # Extract architecture from platform
          ARCHITECTURE=$(echo ${{ matrix.platform }} | cut -d'/' -f2)
          echo "ARCHITECTURE=$ARCHITECTURE" >> $GITHUB_ENV
          
          # Determine base image branch suffix based on current branch
          if [[ "${{ github.ref }}" == "refs/heads/dev" ]]; then
            BASE_BRANCH_SUFFIX="_dev"
          else
            BASE_BRANCH_SUFFIX=""
          fi
          echo "BASE_BRANCH_SUFFIX=$BASE_BRANCH_SUFFIX" >> $GITHUB_ENV
          
          # Set the base image tag with architecture and branch suffix
          BASE_TAG="${{ matrix.base_tag }}${BASE_BRANCH_SUFFIX}_$ARCHITECTURE"
          echo "BASE_TAG=$BASE_TAG" >> $GITHUB_ENV
          
          # Generate tag parts (without registry path) for this build
          # For main branch
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            # Preserve full base tag info including Wine version
            FULL_TAG="${{ matrix.base_tag }}_$ARCHITECTURE"
            echo "FULL_TAG=$FULL_TAG" >> $GITHUB_ENV
            
            # Simple version without Wine info (e.g., "trixie_amd64")
            SIMPLE_TAG=$(echo "${{ matrix.base_tag }}" | cut -d'-' -f1)_$ARCHITECTURE
            echo "SIMPLE_TAG=$SIMPLE_TAG" >> $GITHUB_ENV
            
            # Latest tag per architecture (if using the default base tag)
            if [[ "${{ matrix.base_tag }}" == "trixie-20260421-slim_wine-staging-11.8" ]]; then
              echo "LATEST_ARCH_TAG=latest_$ARCHITECTURE" >> $GITHUB_ENV
            else
              echo "LATEST_ARCH_TAG=" >> $GITHUB_ENV
            fi
          else
            # For dev branch, add _dev suffix but still preserve Wine info
            FULL_TAG="${{ matrix.base_tag }}_dev_$ARCHITECTURE"
            echo "FULL_TAG=$FULL_TAG" >> $GITHUB_ENV
            
            # Simple version with dev suffix
            SIMPLE_TAG=$(echo "${{ matrix.base_tag }}" | cut -d'-' -f1)_dev_$ARCHITECTURE
            echo "SIMPLE_TAG=$SIMPLE_TAG" >> $GITHUB_ENV
            
            echo "LATEST_ARCH_TAG=" >> $GITHUB_ENV
          fi
          
          # Branch tag
          BRANCH_TAG="${{ github.ref_name }}_$ARCHITECTURE"
          echo "BRANCH_TAG=$BRANCH_TAG" >> $GITHUB_ENV
          
          # Set build date for metadata
          echo "BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_ENV

      # Generate metadata for Docker image, including tags
      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY_IMAGE }}
          tags: |
            type=raw,value=${{ env.BRANCH_TAG }}
            type=raw,value=${{ env.FULL_TAG }}
            type=raw,value=${{ env.SIMPLE_TAG }}
            ${{ env.LATEST_ARCH_TAG != '' && format('type=raw,value={0}', env.LATEST_ARCH_TAG) || '' }}
          labels: |
            org.opencontainers.image.title=Conan Exiles Server Docker Image
            org.opencontainers.image.description=Docker image for Conan Exiles dedicated server based on docker-steamcmd-server
            org.opencontainers.image.vendor=TeriyakiDactyl
            org.opencontainers.image.version=${{ github.ref_name }}
            org.opencontainers.image.created=${{ env.BUILD_DATE }}
            org.opencontainers.image.revision=${{ github.sha }}
            com.example.git.branch=${{ github.ref_name }}
            com.example.base.image=${{ env.BASE_REGISTRY_IMAGE }}:${{ env.BASE_TAG }}
            com.example.base.branch=${{ github.ref_name }}

      # Build and push Docker image
      - name: Build and push Docker image
        id: docker_build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BASE_TAG=${{ env.BASE_TAG }}
            SOURCE_COMMIT=${{ github.sha }}
            BUILD_DATE=${{ env.BUILD_DATE }}
            BRANCH_NAME=${{ github.ref_name }}
          platforms: ${{ matrix.platform }}
          cache-from: |
            type=gha,scope=${{ matrix.base_tag }}-${{ matrix.platform }}
          cache-to: |
            type=gha,scope=${{ matrix.base_tag }}-${{ matrix.platform }},mode=max

  # Create multi-architecture manifests
  create-manifest:
    needs: [setup, build]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name != 'pull_request'
    strategy:
      matrix:
        base_tag: ${{ fromJson(needs.setup.outputs.base-tags) }}
    
    steps:
      # Add a debug step to verify the outputs
      - name: Debug job outputs
        run: |
          echo "setup.outputs.base-tags: '${{ needs.setup.outputs.base-tags }}'"
          
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}
          
      - name: Generate manifest tag names
        id: manifest-tags
        run: |
          # Extract the base distribution (e.g., trixie) from the full tag
          BASE_DIST=$(echo "${{ matrix.base_tag }}" | cut -d'-' -f1)
          
          # For main branch
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            # Simple tag (e.g., "trixie")
            echo "SIMPLE_MANIFEST_TAG=$BASE_DIST" >> $GITHUB_ENV
            
            # Full tag with Wine info
            echo "FULL_MANIFEST_TAG=${{ matrix.base_tag }}" >> $GITHUB_ENV
            
            # Set latest tag if this is the default base tag
            if [[ "${{ matrix.base_tag }}" == "trixie-20260421-slim_wine-staging-11.8" ]]; then
              echo "LATEST_TAG=latest" >> $GITHUB_ENV
              echo "HAS_LATEST_TAG=true" >> $GITHUB_ENV
            else
              echo "HAS_LATEST_TAG=false" >> $GITHUB_ENV
            fi
          else
            # For dev branch, add _dev suffix
            echo "SIMPLE_MANIFEST_TAG=${BASE_DIST}_dev" >> $GITHUB_ENV
            echo "FULL_MANIFEST_TAG=${{ matrix.base_tag }}_dev" >> $GITHUB_ENV
            echo "HAS_LATEST_TAG=false" >> $GITHUB_ENV
          fi
      
      # Create and push multi-architecture manifests using buildx imagetools
      - name: Create and push multi-architecture manifests
        run: |
          # Create simple manifest tag (e.g., "trixie")
          docker buildx imagetools create --tag ${{ env.REGISTRY_IMAGE }}:${{ env.SIMPLE_MANIFEST_TAG }} \
            ${{ env.REGISTRY_IMAGE }}:${{ env.SIMPLE_MANIFEST_TAG }}_amd64 \
            ${{ env.REGISTRY_IMAGE }}:${{ env.SIMPLE_MANIFEST_TAG }}_arm64
          
          echo "::notice::Successfully created manifest for ${{ env.REGISTRY_IMAGE }}:${{ env.SIMPLE_MANIFEST_TAG }}"
          
          # Create full manifest tag with Wine info (e.g., "trixie-20260421-slim_wine-staging-11.8")
          docker buildx imagetools create --tag ${{ env.REGISTRY_IMAGE }}:${{ env.FULL_MANIFEST_TAG }} \
            ${{ env.REGISTRY_IMAGE }}:${{ env.FULL_MANIFEST_TAG }}_amd64 \
            ${{ env.REGISTRY_IMAGE }}:${{ env.FULL_MANIFEST_TAG }}_arm64
          
          echo "::notice::Successfully created manifest for ${{ env.REGISTRY_IMAGE }}:${{ env.FULL_MANIFEST_TAG }}"
          
          # Create latest tag if applicable
          if [[ "${{ env.HAS_LATEST_TAG }}" == "true" ]]; then
            docker buildx imagetools create --tag ${{ env.REGISTRY_IMAGE }}:latest \
              ${{ env.REGISTRY_IMAGE }}:latest_amd64 \
              ${{ env.REGISTRY_IMAGE }}:latest_arm64
              
            echo "::notice::Successfully created 'latest' multi-architecture manifest"
          fi

  # Notification job
  notify:
    needs: [create-manifest]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Set status
        id: status
        run: |
          if [[ "${{ needs.create-manifest.result }}" == "success" ]]; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "message=Docker images successfully built and pushed" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
            echo "message=Failed to build or push some Docker images" >> $GITHUB_OUTPUT
          fi
      
      # Update GitHub status with workflow results
      - name: Update status
        run: |
          echo "::notice::Workflow completed with status: ${{ steps.status.outputs.status }}"
          echo "::notice::${{ steps.status.outputs.message }}"
